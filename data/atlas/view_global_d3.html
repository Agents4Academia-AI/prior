<title>Prior — contribution graph (D3)</title>

<style>
  :root{
    /* muted "teal-to-rust" palette, matching view_contributions.html */
    --bg:#faf6ec; --bg-elev:#fbfcfd; --bg-elev-2:#f1ece0;
    --border:#e2e5ea; --border-soft:#eceff4;
    --text:#3b4252; --text-dim:#6b7686; --text-faint:#9aa0b0;
    --accent:#0a9396; --accent-soft:rgba(10,147,150,.12);
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{display:flex;background:var(--bg);color:var(--text);
       font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  #canvas{position:relative;flex:1;min-width:0}
  svg{width:100%;height:100%;display:block;cursor:grab}
  svg:active{cursor:grabbing}

  .header{position:absolute;top:14px;left:14px;z-index:5;max-width:60%}
  .header h1{margin:0;font-size:15px;letter-spacing:.3px}
  .header .sub{margin-top:3px;font-size:12px;color:var(--text-dim)}
  .header .sub b{color:var(--text)}
  .controls{margin-top:9px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .controls label{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);
                  background:var(--bg-elev);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer}
  .controls input{accent-color:var(--accent)}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .seg button{background:var(--bg-elev);border:none;color:var(--text-dim);padding:6px 14px;font-size:12px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff;font-weight:600}
  .issues{font-size:12px;color:#9c5a00;background:#fdf2dc;border:1px solid #f0d9b0;border-radius:8px;padding:4px 9px}

  .legend{position:absolute;bottom:14px;left:14px;z-index:5;background:var(--bg-elev);
          border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:11px;max-width:240px}
  .legend .lg-title{color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;font-size:10px;margin:0 0 5px}
  .legend .lg-row + .lg-title{margin-top:9px}
  .lg-row{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .swatch{width:20px;height:0;border-top:3px solid;display:inline-block}
  .swatch.faint{border-top-width:1.5px;opacity:.7}
  .glyph{width:13px;height:13px;display:inline-block;border-radius:50%}
  .glyph.box{border-radius:3px;border:1.5px solid var(--text-dim);background:var(--bg-elev-2)}

  .zoom{position:absolute;top:14px;right:calc(360px + 14px);z-index:5;display:flex;flex-direction:column;gap:1px}
  .zoom button{width:30px;height:30px;background:var(--bg-elev);color:var(--text-dim);
               border:1px solid var(--border);font-size:16px;line-height:1;cursor:pointer}
  .zoom button:first-child{border-radius:8px 8px 0 0}
  .zoom button:last-child{border-radius:0 0 8px 8px;font-size:11px}
  .zoom button:hover{color:var(--text);background:var(--bg-elev-2)}

  #side{width:360px;flex:0 0 360px;background:var(--bg-elev);border-left:1px solid var(--border);
        overflow-y:auto;padding:18px}
  #side .empty{color:var(--text-faint);text-align:center;padding:36px 6px;font-size:13px}
  .field{margin-bottom:14px}
  .field .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);margin-bottom:3px}
  .field .v{font-size:13px}
  .pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;color:#fff}
  .quote{font-size:12.5px;color:var(--text-dim);border-left:2px solid var(--border);padding-left:9px;font-style:italic}
  .src{font-family:var(--mono);font-size:11px;color:var(--accent)}
  a.src{text-decoration:none}
  .neighbour{border:1px solid var(--border-soft);border-radius:6px;padding:8px 10px;margin-bottom:7px;background:var(--bg-elev-2)}
  .neighbour .nh{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px}
  .neighbour .ev{font-size:11.5px;color:var(--text-dim)}
  .neighbour .nid{font-family:var(--mono);font-size:10.5px;color:var(--text-faint)}

  /* review queue (edit mode) */
  .qhead{font-size:12px;color:var(--text-dim);margin-bottom:11px}
  .flag{border:1px solid var(--border);border-left-width:3px;border-radius:7px;padding:9px 11px;margin-bottom:9px;
        background:var(--bg-elev);cursor:pointer}
  .flag.high{border-left-color:#ae2012} .flag.medium{border-left-color:#ca6702} .flag.low{border-left-color:#9aa0b0}
  .flag .ft{display:flex;justify-content:space-between;gap:8px;align-items:center;font-weight:600;font-size:12.5px}
  .flag .sev{font-size:9px;text-transform:uppercase;letter-spacing:.5px;padding:1px 6px;border-radius:4px;color:#fff}
  .flag.high .sev{background:#ae2012} .flag.medium .sev{background:#ca6702} .flag.low .sev{background:#9aa0b0}
  .flag .ttl{font-size:11.5px;color:var(--text);margin:5px 0 0}
  .flag .fd{font-size:11px;color:var(--text-dim);margin:4px 0 8px}
  .flag .acts{display:flex;gap:6px}
  .flag .acts button{font-size:11.5px;border-radius:6px;padding:4px 11px;border:1px solid var(--border);cursor:pointer}
  .flag .apply{background:var(--accent);color:#fff;border-color:var(--accent)}
  .flag .ignore{background:var(--bg-elev-2);color:var(--text)}
  .qdone{color:var(--accent);text-align:center;padding:26px 8px;font-size:14px}
  .expbtn{width:100%;margin-top:4px;padding:9px;border-radius:7px;border:1px solid var(--border);
          background:var(--bg-elev-2);color:var(--text);cursor:pointer;font-size:12px}

  text.nodelabel{font-family:var(--sans);font-size:10.5px;fill:var(--text);paint-order:stroke;
             stroke:var(--bg);stroke-width:3px;stroke-linejoin:round;pointer-events:none}
  .paper-box text{font-family:var(--sans);font-size:10.5px;font-weight:600;pointer-events:none;
                  dominant-baseline:middle;text-anchor:middle}
  .badge text{pointer-events:none}
</style>
</head>

  <script id="graph-data" type="application/json">{"contributions": [{"id": "openalex:W4401042735::k00", "paper_id": "openalex:W4401042735", "statement": "A RAG-based system for structured output generation (workflow-to-JSON) that retrieves relevant JSON objects from a large, customizable step catalogue and injects them into the LLM prompt, significantly reducing hallucination of non-existent steps and database table names.", "kind": "method", "quote": "We provide an application of RAG in workflow generation, a structured output task. We show that using RAG reduces hallucination and improves results."}, {"id": "openalex:W4401042735::k01", "paper_id": "openalex:W4401042735", "statement": "A small, well-trained dense retriever that aligns natural language queries with structured JSON objects enables deployment of a smaller LLM at no loss in performance, making LLM-based structured-output systems less resource-intensive.", "kind": "empirical_finding", "quote": "We demonstrate that RAG allows deploying a smaller LLM while using a very small retriever model, at no loss in performance."}, {"id": "openalex:W4401042735::k02", "paper_id": "openalex:W4401042735", "statement": "RAG-augmented structured output generation generalises to out-of-domain enterprise settings, reducing the out-of-distribution mismatch without requiring per-customer LLM fine-tuning.", "kind": "empirical_finding", "quote": "our proposed system significantly reduces hallucination and allows the generalization of our LLM to out-of-domain settings"}, {"id": "openalex:W3155807546::k00", "paper_id": "openalex:W3155807546", "statement": "Neural retrieval-in-the-loop architectures \u2014 combining retrievers, rankers, and encoder-decoders \u2014 applied to knowledge-grounded multi-turn dialogue achieve state-of-the-art performance and reduce hallucinated responses by over 60% compared to non-retrieval-augmented large language models.", "kind": "empirical_finding", "quote": "We demonstrate that our best models obtain state-of-the-art performance on two knowledge-grounded conversational tasks. The models exhibit open-domain conversational capabilities, generalize effectively to scenarios not within the training data, and, as verified by human evaluations, substantially reduce the well-known problem of knowledge hallucination in state-of-the-art chatbots."}, {"id": "openalex:W3155807546::k01", "paper_id": "openalex:W3155807546", "statement": "Retrieval augmentation for dialogue generalizes more effectively to out-of-distribution topics than parametric language models, with knowledgeability gains of 70% on in-distribution data and 85% on out-of-distribution data.", "kind": "empirical_finding", "quote": "this effect is even more pronounced on out-of-distribution topics and test data, a case where retrieval can intuitively supplement what is simply not in the weights of the model: knowledgeability metric gains over the baseline are 70% for in-distribution data and 85% for out-of-distribution data"}, {"id": "openalex:W3155807546::k02", "paper_id": "openalex:W3155807546", "statement": "Dialogue turn-based retrieval \u2014 querying a large unstructured document store per conversation turn using the full multi-turn context \u2014 avoids the information loss of standard single-query retrievers in multi-turn settings.", "kind": "method", "quote": "by building a dialogue turn-based retrieval mechanism that avoids the problem of standard retrievers that ignore much of the dialogue context"}, {"id": "openalex:W3155807546::k03", "paper_id": "openalex:W3155807546", "statement": "Poly-encoder Transformers used for finer-grained context-candidate document scoring improve downstream knowledge-grounded dialogue performance within retrieval-augmented generation pipelines.", "kind": "method", "quote": "we improve downstream performance by employing Poly-encoder Transformers (Humeau et al., 2020) for finer-grained context-candidate scoring of documents"}, {"id": "openalex:W4394838812::k00", "paper_id": "openalex:W4394838812", "statement": "Retrieval-Augmented Generation applied to structured output generation \u2014 retrieving relevant JSON objects as suggestions that are prepended to the LLM prompt \u2014 reduces hallucination in workflow generation tasks and improves out-of-domain generalization.", "kind": "method", "quote": "we devised a system leveraging Retrieval-Augmented Generation (RAG) to improve the quality of the structured output that represents such workflows. Thanks to our implementation of RAG, our proposed system significantly reduces hallucination and allows the generalization of our LLM to out-of-domain settings."}, {"id": "openalex:W4394838812::k01", "paper_id": "openalex:W4394838812", "statement": "A small, well-trained retriever encoder, fine-tuned to align natural language queries with structured JSON objects, enables a smaller accompanying LLM to match the performance of a larger LLM, making RAG-based structured-output deployments less resource-intensive.", "kind": "empirical_finding", "quote": "we show that using a small, well-trained retriever can reduce the size of the accompanying LLM at no loss in performance, thereby making deployments of LLM-based systems less resource-intensive."}, {"id": "openalex:W4394838812::k02", "paper_id": "openalex:W4394838812", "statement": "RAG for workflow generation, where retrieved JSON step and table objects serve as in-context suggestions, is an effective application of retrieval augmentation to a structured output task with a large, customizable lexicon where in-context learning alone is impractical.", "kind": "method", "quote": "We provide an application of RAG in workflow generation, a structured output task."}, {"id": "openalex:W4389520468::k00", "paper_id": "openalex:W4389520468", "statement": "Iter-RetGen \u2014 an iterative retrieval-generation synergy approach that uses a model's full response from one iteration as a retrieval query for the next, alternating retrieval-augmented generation and generation-augmented retrieval \u2014 achieves strong performance on multi-hop question answering, fact verification, and commonsense reasoning while incurring fewer retrieval and generation overheads than methods that interleave retrieval with generation mid-output.", "kind": "method", "quote": "we show that strong performance can be achieved by a method we call Iter-RetGen, which synergizes retrieval and generation in an iterative manner: a model's response to a task input shows what might be needed to finish the task, and thus can serve as an informative context for retrieving more relevant knowledge which in turn helps generate a better response in another iteration"}, {"id": "openalex:W4389520468::k01", "paper_id": "openalex:W4389520468", "statement": "Generation-augmented retrieval adaptation \u2014 distilling knowledge from a re-ranker that has access to model generations into a dense retriever that operates only on task inputs \u2014 further improves retrieval quality and reduces the number of iterations needed.", "kind": "method", "quote": "We can also leverage model generations to adapt retrieval, by distilling knowledge from a re-ranker with access to model generations to a dense retriever with access to task inputs only"}, {"id": "openalex:W4389520468::k02", "paper_id": "openalex:W4389520468", "statement": "Automatic exact-match metrics significantly underestimate LLM performance on question answering tasks, and improvements in exact match do not always reflect improvements in generation quality, suggesting LLM-based evaluation is more reliable.", "kind": "empirical_finding", "quote": "Automatic metrics such as exact match can significantly underestimate the performance of LLMs in question answering tasks. Moreover, improvements in exact match do not always reflect improvements in generations. Evaluation using LLMs may be more reliable."}, {"id": "openalex:W3176182290::k00", "paper_id": "openalex:W3176182290", "statement": "Generation-Augmented Retrieval (GAR) \u2014 expanding open-domain question answering queries with heuristically discovered relevant contexts (answer, answer sentence, passage title) generated by a pre-trained language model via seq2seq learning, without external supervision or reinforcement learning feedback \u2014 enables sparse BM25 retrieval to match or exceed state-of-the-art dense retrieval methods such as DPR.", "kind": "method", "quote": "We propose Generation-Augmented Retrieval (GAR), which augments queries with heuristically discovered relevant contexts through text generation without external supervision or time-consuming downstream feedback."}, {"id": "openalex:W3176182290::k01", "paper_id": "openalex:W3176182290", "statement": "Fusing retrieval results from multiple diverse generation targets (different context types augmenting the same query) consistently improves retrieval accuracy over using a single generation target in generation-augmented retrieval.", "kind": "empirical_finding", "quote": "We show that using generation-augmented queries achieves significantly better retrieval and QA results than using the original queries or existing unsupervised QE methods."}, {"id": "openalex:W3176182290::k02", "paper_id": "openalex:W3176182290", "statement": "GAR combined with BM25 achieves state-of-the-art extractive open-domain QA performance on Natural Questions and TriviaQA, and further gains are obtained by fusing GAR with dense retrieval (DPR), as sparse and dense representations are complementary.", "kind": "empirical_finding", "quote": "We show that GAR, combined with a simple BM25 model, achieves new state-of-the-art performance on two benchmark datasets in extractive OpenQA and competitive results in the generative setting."}, {"id": "openalex:W4389518671::k00", "paper_id": "openalex:W4389518671", "statement": "Rewrite-Retrieve-Read \u2014 a retrieval-augmented generation framework that inserts a query-rewriting step before retrieval, using an LLM prompt to rewrite the input query and close the gap between raw input text and retrieval need, before passing the rewritten query to a web search engine and a frozen LLM reader.", "kind": "framework", "quote": "This work introduces a new framework, Rewrite-Retrieve-Read instead of the previous retrieve-then-read for the retrieval-augmented LLMs from the perspective of the query rewriting."}, {"id": "openalex:W4389518671::k01", "paper_id": "openalex:W4389518671", "statement": "A trainable query-rewriting scheme in which a small language model is fine-tuned via reinforcement learning \u2014 using downstream LLM reader performance as reward \u2014 to adapt search queries for frozen retriever and black-box LLM reader modules, achieving performance gains with reduced resource consumption.", "kind": "method", "quote": "We also propose a trainable scheme for our rewrite-retrieve-read framework... A small language model is adopted as a trainable rewriter to cater to the black-box LLM reader. The rewriter is trained using the feedback of the LLM reader by reinforcement learning."}, {"id": "openalex:W4389518671::k02", "paper_id": "openalex:W4389518671", "statement": "Query rewriting consistently improves retrieval-augmented LLM performance on open-domain QA and multiple-choice QA benchmarks, and a small language model is sufficient to serve as a competent query rewriter.", "kind": "empirical_finding", "quote": "The results show that query rewriting consistently improves the retrieve-augmented LLM performance. The results also indicate that the smaller language model can be competent for query rewriting."}, {"id": "openalex:W4402670429::k00", "paper_id": "openalex:W4402670429", "statement": "Chain-of-Verification (CoVe) \u2014 a four-step prompting method in which a language model drafts an initial response, plans targeted verification questions, answers those questions independently (without conditioning on the original response), and revises its final answer \u2014 reduces hallucination in large language models across list-based, closed-book QA, and long-form generation tasks.", "kind": "method", "quote": "We develop the Chain-of-Verification (COVE) method whereby the model first (i) drafts an initial response; then (ii) plans verification questions to fact-check its draft; (iii) answers those questions independently so the answers are not biased by other responses; and (iv) generates its final verified response."}, {"id": "openalex:W4402670429::k01", "paper_id": "openalex:W4402670429", "statement": "Factored variants of Chain-of-Verification, which separate the verification execution step from the context of the original draft, yield greater hallucination reduction than a joint left-to-right verification chain by preventing the model from conditioning on and repeating its own hallucinated content.", "kind": "method", "quote": "Hence we also introduce further improvements with factored variants which separate out the verification chain steps, in terms of which context is attended to. We show how these factored variants give further performance gains across all three tasks considered."}, {"id": "openalex:W4402670429::k02", "paper_id": "openalex:W4402670429", "statement": "Independent verification questions generated about specific factual claims in a draft response are answered more accurately than the same facts appear in the original long-form generation, enabling self-correction without external retrieval.", "kind": "empirical_finding", "quote": "We find that independent verification questions tend to provide more accurate facts than those in the original longform answer, and hence improve the correctness of the overall response."}, {"id": "openalex:W3186138538::k00", "paper_id": "openalex:W3186138538", "statement": "An internet-augmented dialogue generation approach that learns to generate a search query from conversational context and conditions on live internet search results to produce grounded, up-to-date responses.", "kind": "method", "quote": "we propose an approach that learns to generate an internet search query based on the context, and then conditions on the search results to finally generate a response, a method that can employ up-to-the-minute relevant information"}, {"id": "openalex:W3186138538::k01", "paper_id": "openalex:W3186138538", "statement": "Wizard of the Internet \u2014 a crowdsourced dataset of human-human knowledge-driven conversations in which one speaker uses live internet search to ground their responses.", "kind": "dataset", "quote": "We train and evaluate such models on a newly collected dataset of human-human conversations whereby one of the speakers is given access to internet search during knowledge-driven discussions in order to ground their responses"}, {"id": "openalex:W3186138538::k02", "paper_id": "openalex:W3186138538", "statement": "Search-query-based internet retrieval outperforms both non-augmented generation and FAISS-based dense retrieval (RAG, FiD-RAG) for knowledge-grounded dialogue, as measured by automatic metrics and human evaluations.", "kind": "empirical_finding", "quote": "We find that search-query based access of the internet in conversation provides superior performance compared to existing approaches that either use no augmentation or FAISS-based retrieval"}, {"id": "arxiv:2506.06962v3::k00", "paper_id": "arxiv:2506.06962v3", "statement": "AR-RAG (Autoregressive Retrieval Augmentation) \u2014 a patch-level retrieval-augmented image generation framework that dynamically retrieves k-nearest neighbor patch-level visual references at each generation step using already-generated surrounding patches as queries, avoiding over-copying and stylistic bias present in static, image-level retrieval methods.", "kind": "framework", "quote": "We propose AR-RAG, the first patch-level autoregressive retrieval augmentation framework which dynamically retrieves and integrates fine-grained visual content to enhance image generation, while avoiding limitations (e.g., over-copying, stylistic bias, etc.) prevalent in existing image-level retrieval augmentation methods."}, {"id": "arxiv:2506.06962v3::k01", "paper_id": "arxiv:2506.06962v3", "statement": "Distribution-Augmentation in Decoding (DAiD) \u2014 a training-free, plug-and-play decoding strategy that enhances autoregressive image generation by linearly combining the model's predicted patch token distribution with a distribution derived from retrieved nearest-neighbor patches, requiring no fine-tuning and integrating directly into existing architectures.", "kind": "method", "quote": "We introduce Distribution-Augmentation in Decoding (DAiD), a training-free, plug-and-play decoding strategy that directly integrates the distribution of retrieved patches into that predicted by the image generation models, enabling easy integration into existing architectures."}, {"id": "arxiv:2506.06962v3::k02", "paper_id": "arxiv:2506.06962v3", "statement": "Feature-Augmentation in Decoding (FAiD) \u2014 a parameter-efficient fine-tuning method that progressively refines retrieved patch features via multi-scale convolutional smoothing and blends them with the model's intermediate representations at multiple transformer layers, improving spatial coherence and visual quality in autoregressive image generation.", "kind": "method", "quote": "We introduce Feature-Augmentation in Decoding (FAiD), a parameter-efficient fine-tuning framework that progressively refines and blends retrieval signals via lightweight convolutional modules, enhancing spatial coherence and visual quality across layers."}, {"id": "arxiv:2506.06962v3::k03", "paper_id": "arxiv:2506.06962v3", "statement": "Applying AR-RAG (FAiD variant) to Janus-Pro achieves 6.67 FID on Midjourney-30K and 0.78 overall score on GenEval, establishing a new state of the art among autoregressive image generation models of comparable scale.", "kind": "empirical_finding", "quote": "Janus-Pro with FAiD achieves 6.67 FID on Midjourney-30K and 0.78 overall score on GenEval, establishing a new state of the art among autoregressive image generation models of comparable scale."}, {"id": "arxiv:2504.13684v1::k00", "paper_id": "arxiv:2504.13684v1", "statement": "A think-aloud study in a multi-modal exhibition setting surfaces key cognitive challenges users face when structuring, retrieving, and applying knowledge in information-rich, real-world environments, and reveals expectations for adaptive AI-driven cognitive support.", "kind": "empirical_finding", "quote": "This work contributes by identifying key cognitive challenges in knowledge augmentation, offering empirical insights into users' expectations for AI-driven support"}, {"id": "arxiv:2504.13684v1::k01", "paper_id": "arxiv:2504.13684v1", "statement": "A framework for context-aware cognitive augmentation in which LLMs dynamically adapt to users' cognitive states and task environments, seamlessly transitioning between real-time cognitive support and post-experience knowledge organization.", "kind": "framework", "quote": "We propose a framework for AI augmentation that seamlessly transitions between real-time cognitive support and post-experience knowledge organization, contributing to the design of more effective human-centered AI systems"}, {"id": "arxiv:2504.13684v1::k02", "paper_id": "arxiv:2504.13684v1", "statement": "Design considerations for integrating real-time contextual awareness, personalized reasoning assistance, and socially adaptive interactions into LLM-based cognitive support systems.", "kind": "analysis", "quote": "suggesting design considerations for integrating context-aware reasoning into LLM-based systems"}, {"id": "arxiv:2504.17204v1::k00", "paper_id": "arxiv:2504.17204v1", "statement": "Factually \u2014 a proactive wearable fact-checking system integrated into smartwatches or rings that transcribes ambient speech in real time, flags potentially false claims via a backend combining large language models and web-based resources, and delivers discreet vibrotactile alerts to the wearer, enabling real-time misinformation discernment without disrupting social interaction.", "kind": "model", "quote": "we present Factually \u2014 a proactive, wearable fact-checking system integrated into devices like smartwatches or rings. Factually discreetly alerts users to potential falsehoods via vibrotactile feedback, helping them assess information critically."}, {"id": "arxiv:2504.17204v1::k01", "paper_id": "arxiv:2504.17204v1", "statement": "A design framework for wearable misinformation-detection systems grounded in assistive augmentation principles, structured around two dimensions \u2014 ability (amplifying cognitive capacity for truth discernment) and integration (embedding augmentation seamlessly into everyday social contexts through non-verbal tactile cues rather than disruptive audio or visual signals).", "kind": "framework", "quote": "The design of the Factually is inspired by the principles of assistive augmentation \u2026 They introduce assistive augmentation as a paradigm that enhances human capabilities along two primary dimensions: ability (expanding cognitive and sensory capacities) and integration (seamlessly embedding augmentation into everyday life). We design Factually so that it embodies these dimensions in the context of misinformation detection and truth discernment."}, {"id": "arxiv:2504.17204v1::k02", "paper_id": "arxiv:2504.17204v1", "statement": "Three proof-of-concept scenarios \u2014 health misinformation in casual conversation, social conversation fact-checking, and everyday learning \u2014 that illustrate how wearable real-time fact-checking can extend cognitive abilities across naturalistic, interpersonal settings.", "kind": "other", "quote": "To demonstrate the potential of Factually, we developed three proof-of-concept scenarios \u2026 highlighting its potential to extend cognitive abilities for real-time misinformation detection."}, {"id": "arxiv:2504.17204v1::k03", "paper_id": "arxiv:2504.17204v1", "statement": "Early qualitative evidence that discreet wearable fact-checking via vibrotactile feedback can enhance users' fact-checking capabilities, yielding both practical utility and experiential benefits during real-world interactions.", "kind": "empirical_finding", "quote": "Early qualitative feedback suggests that Factually can enhance users' fact-checking capabilities, offering both practical and experiential benefits."}, {"id": "arxiv:2504.14689v1::k00", "paper_id": "arxiv:2504.14689v1", "statement": "A conceptual distinction between 'performed critical thinking' \u2014 independent cognitive processes undertaken without AI assistance \u2014 and 'demonstrated critical thinking' \u2014 the process or product of thinking that occurs through collaboration with generative AI \u2014 clarifies what is actually being measured or augmented when AI systems interact with human cognition.", "kind": "analysis", "quote": "this position paper proposes the distinction between demonstrated and performed critical thinking in the era of generative AI and discusses the implication of this distinction in research and development of AI systems that aim to augment human critical thinking"}, {"id": "arxiv:2504.14689v1::k01", "paper_id": "arxiv:2504.14689v1", "statement": "Current empirical evaluations of generative AI's impact on critical thinking conflate performed and demonstrated critical thinking by assessing only AI-assisted outputs, thereby failing to measure whether independent cognitive abilities have improved; longitudinal and pre/post study designs are needed to isolate effects on performed critical thinking.", "kind": "empirical_finding", "quote": "We identify that current evaluation on the impact of GenAI on critical thinking skills often focuses on demonstrated rather than performed critical thinking and provide considerations for future research designs"}, {"id": "arxiv:2504.14689v1::k02", "paper_id": "arxiv:2504.14689v1", "statement": "While current AI systems and interaction paradigms can enhance demonstrated critical thinking, they do not necessarily improve performed critical thinking; design considerations grounded in the Engelbart intellect-augmentation framework \u2014 targeting the underlying cognitive processes rather than output quality \u2014 are required to augment independent human critical thinking.", "kind": "analysis", "quote": "we argue that while current AI systems and interaction paradigms may enhance the demonstrated critical thinking, they do not necessarily improve the performed critical thinking. We also discuss design considerations to accomplish the latter"}], "edges": [{"src": "openalex:W4401042735::k00", "dst": "openalex:W4394838812::k00", "relation": "supports", "evidence": "Both papers independently demonstrate that RAG applied to workflow/JSON structured output generation reduces hallucination of non-existent steps, providing mutual corroborating evidence across two distinct publications.", "confidence": 0.6}, {"src": "openalex:W4401042735::k01", "dst": "openalex:W4394838812::k01", "relation": "supports", "evidence": "Both contributions, from different papers (W4401042735 and W4394838812), independently report that a small, well-trained dense retriever enables a smaller LLM to match a larger LLM in RAG-based structured output, replicating each other's central finding.", "confidence": 0.6}, {"src": "openalex:W4401042735::k02", "dst": "openalex:W3155807546::k01", "relation": "supports", "evidence": "W4401042735 shows RAG generalizes to out-of-domain enterprise settings without per-customer fine-tuning; W3155807546 independently shows retrieval augmentation generalizes more effectively to OOD topics than parametric LMs, corroborating the OOD generalization benefit across different domains.", "confidence": 0.6}, {"src": "openalex:W3155807546::k00", "dst": "openalex:W4401042735::k00", "relation": "supports", "evidence": "The over 60% reduction in hallucinated responses via neural retrieval-augmented dialogue (W3155807546) provides evidence that RAG reliably suppresses hallucination, supporting W4401042735's claim that RAG reduces hallucination in structured workflow output.", "confidence": 0.6}, {"src": "openalex:W3155807546::k00", "dst": "openalex:W4394838812::k00", "relation": "supports", "evidence": "RAG cutting hallucinated responses by more than 60% in knowledge-grounded dialogue (W3155807546) corroborates W4394838812's finding that RAG reduces hallucination in workflow generation tasks.", "confidence": 0.6}, {"src": "openalex:W4394838812::k02", "dst": "openalex:W4401042735::k00", "relation": "supports", "evidence": "W4394838812's finding that RAG with retrieved JSON objects is effective for structured output where in-context learning alone is impractical (large lexicon) supports W4401042735's claim that RAG significantly reduces hallucination of non-existent steps and table names in workflow-to-JSON generation.", "confidence": 0.6}, {"src": "openalex:W4389518671::k00", "dst": "openalex:W3176182290::k00", "relation": "extends", "evidence": "GAR (W3176182290) uses a seq2seq model to generate expanded query contexts for sparse BM25 retrieval; Rewrite-Retrieve-Read (W4389518671) extends this by introducing a dedicated LLM-based query-rewriting step as a general modular framework applicable to web search and frozen readers, making query adaptation an explicit stage.", "confidence": 0.6}, {"src": "openalex:W4389518671::k01", "dst": "openalex:W3176182290::k00", "relation": "extends", "evidence": "GAR (W3176182290) uses heuristic seq2seq generation for query expansion; W4389518671's trainable RL-based rewriter extends this by optimizing the query-generation step end-to-end with downstream reader performance as reward, replacing heuristic generation with learnable adaptation.", "confidence": 0.6}, {"src": "openalex:W4389520468::k00", "dst": "openalex:W3155807546::k02", "relation": "extends", "evidence": "W3155807546 proposes per-turn retrieval using the full multi-turn conversational context to avoid information loss; Iter-RetGen (W4389520468) extends this idea into a general iterative loop where the model's full response is used as the retrieval query for the next iteration, generalizing beyond dialogue to multi-hop QA, fact verification, and commonsense reasoning.", "confidence": 0.6}, {"src": "openalex:W3186138538::k00", "dst": "openalex:W3155807546::k02", "relation": "extends", "evidence": "W3155807546 proposes per-turn retrieval from a static document store using full multi-turn context; W3186138538 extends this to live internet search by learning to generate search queries from conversational context, enabling dynamic grounding on up-to-date information.", "confidence": 0.6}, {"src": "arxiv:2506.06962v3::k00", "dst": "openalex:W4389520468::k00", "relation": "extends", "evidence": "Iter-RetGen (W4389520468) establishes iterative retrieval-generation synergy for text-based knowledge tasks; AR-RAG (arxiv:2506.06962v3) extends this concept to image generation, dynamically retrieving patch-level visual references at each autoregressive decoding step using already-generated patches as queries.", "confidence": 0.6}, {"src": "arxiv:2504.14689v1::k02", "dst": "arxiv:2504.13684v1::k01", "relation": "refines", "evidence": "arxiv:2504.13684v1 proposes a broad LLM framework for context-aware cognitive augmentation; arxiv:2504.14689v1 narrows its scope by showing that such systems enhance demonstrated (AI-assisted) critical thinking but do not necessarily improve performed (independent) critical thinking, adding a critical boundary condition.", "confidence": 0.6}, {"src": "arxiv:2504.14689v1::k01", "dst": "arxiv:2504.13684v1::k01", "relation": "refines", "evidence": "arxiv:2504.13684v1 proposes LLM-based cognitive augmentation adapting to users' cognitive states; arxiv:2504.14689v1 refines this by adding the condition that current evaluations of such systems conflate demonstrated and performed critical thinking, limiting how broadly cognitive augmentation claims can be interpreted.", "confidence": 0.6}, {"src": "openalex:W3186138538::k02", "dst": "openalex:W3176182290::k02", "relation": "supports", "evidence": "W3186138538 shows search-query-based internet retrieval outperforms dense retrieval (RAG, FiD-RAG) for knowledge-grounded dialogue; W3176182290 shows GAR+BM25 matches or exceeds dense DPR on open-domain QA. Both support the claim that sparse/search retrieval can be competitive with or superior to dense retrieval.", "confidence": 0.6}, {"src": "openalex:W4389520468::k02", "dst": "openalex:W3176182290::k02", "relation": "refines", "evidence": "W3176182290 claims state-of-the-art extractive QA performance measured by exact-match on Natural Questions and TriviaQA; W4389520468 adds the condition that automatic exact-match metrics significantly underestimate LLM performance, narrowing the interpretation of those benchmark results.", "confidence": 0.6}, {"src": "openalex:W4389520468::k02", "dst": "openalex:W4389518671::k02", "relation": "refines", "evidence": "W4389518671 reports that query rewriting consistently improves RAG performance on QA benchmarks assessed with exact-match metrics; W4389520468's finding that exact-match metrics underestimate LLM performance adds conditions limiting how those improvements should be interpreted.", "confidence": 0.6}, {"src": "openalex:W3176182290::k00", "dst": "openalex:W4389520468::k01", "relation": "supports", "evidence": "GAR (W3176182290) demonstrates that using LM-generated contexts to augment retrieval queries improves retrieval accuracy; W4389520468's generation-augmented retrieval adaptation corroborates this by showing that distilling knowledge derived from model generations into the dense retriever further improves retrieval quality.", "confidence": 0.6}], "papers": {"arxiv:2504.14689v1": {"cite": "Mei et al. (2025)", "title": "Designing AI Systems that Augment Human Performed vs. Demonstrated Critical Thinking", "year": "2025", "authors": "Katelyn Xiaoying Mei, Nic Weber", "url": "http://arxiv.org/abs/2504.14689v1"}, "openalex:W4402670429": {"cite": "Dhuliawala et al. (2024)", "title": "Chain-of-Verification Reduces Hallucination in Large Language Models", "year": "2024", "authors": "Shehzaad Dhuliawala, Mojtaba Komeili, Jing Xu, Roberta R\u0103ileanu, Xian Li, Asl\u0131 \u00c7eliky\u0131lmaz, Jason Weston", "url": "https://openalex.org/W4402670429"}, "arxiv:2504.13684v1": {"cite": "Xiangrong et al. (2025)", "title": "Intelligent Interaction Strategies for Context-Aware Cognitive Augmentation", "year": "2025", "authors": "Xiangrong, Zhu, Yuan Xu, Tianjian Liu, Jingwei Sun, Yu Zhang, Xin Tong", "url": "http://arxiv.org/abs/2504.13684v1"}, "openalex:W4394838812": {"cite": "B\u00e9chard et al. (2024)", "title": "Reducing hallucination in structured outputs via Retrieval-Augmented Generation", "year": "2024", "authors": "Patrice B\u00e9chard, Orlando Marquez Ayala", "url": "https://openalex.org/W4394838812"}, "arxiv:2504.17204v1": {"cite": "Gupta et al. (2025)", "title": "Factually: Exploring Wearable Fact-Checking for Augmented Truth Discernment", "year": "2025", "authors": "Chitralekha Gupta, Hanjun Wu, Praveen Sasikumar, Shreyas Sridhar, Priambudi Bagaskara, Suranga Nanayakkara", "url": "http://arxiv.org/abs/2504.17204v1"}, "openalex:W3155807546": {"cite": "Shuster et al. (2021)", "title": "Retrieval Augmentation Reduces Hallucination in Conversation", "year": "2021", "authors": "Kurt Shuster, Spencer Poff, Moya Chen, Douwe Kiela, Jason Weston", "url": "https://openalex.org/W3155807546"}, "arxiv:2506.06962v3": {"cite": "Qi et al. (2025)", "title": "AR-RAG: Autoregressive Retrieval Augmentation for Image Generation", "year": "2025", "authors": "Jingyuan Qi, Zhiyang Xu, Qifan Wang, Lifu Huang", "url": "http://arxiv.org/abs/2506.06962v3"}, "openalex:W4389520468": {"cite": "Shao et al. (2023)", "title": "Enhancing Retrieval-Augmented Large Language Models with Iterative Retrieval-Generation Synergy", "year": "2023", "authors": "Zhihong Shao, Yeyun Gong, Yelong Shen, Minlie Huang, Nan Duan, Weizhu Chen", "url": "https://openalex.org/W4389520468"}, "openalex:W4401042735": {"cite": "Ayala et al. (2024)", "title": "Reducing hallucination in structured outputs via Retrieval-Augmented Generation", "year": "2024", "authors": "Orlando Ayala, Patrice Bechard", "url": "https://openalex.org/W4401042735"}, "openalex:W3186138538": {"cite": "Komeili et al. (2022)", "title": "Internet-Augmented Dialogue Generation", "year": "2022", "authors": "Mojtaba Komeili, Kurt Shuster, Jason Weston", "url": "https://openalex.org/W3186138538"}, "openalex:W4389518671": {"cite": "Ma et al. (2023)", "title": "Query Rewriting in Retrieval-Augmented Large Language Models", "year": "2023", "authors": "Xinbei Ma, Yeyun Gong, Pengcheng He, Hai Zhao, Nan Duan", "url": "https://openalex.org/W4389518671"}, "openalex:W3176182290": {"cite": "Mao et al. (2021)", "title": "Generation-Augmented Retrieval for Open-Domain Question Answering", "year": "2021", "authors": "Yuning Mao, Pengcheng He, Xiaodong Liu, Yelong Shen, Jianfeng Gao, Jiawei Han, Weizhu Chen", "url": "https://openalex.org/W3176182290"}}, "flags": [{"id": "dup:openalex:W4401042735", "type": "duplicate_paper", "severity": "high", "title": "Reducing hallucination in structured outputs via Retrieval-Augmented Generation", "detail": "2 records share a title \u2014 likely one paper. Versions: arXiv preprint, published. DOIs: https://doi.org/10.18653/v1/2024.naacl-industry.19; https://doi.org/10.48550/arxiv.2404.08189", "action": "Merge into one paper", "items": ["paper:openalex:W4401042735", "paper:openalex:W4394838812"], "op": {"kind": "merge", "canon": "openalex:W4401042735", "from": ["openalex:W4401042735", "openalex:W4394838812"], "contrib_remap": {"openalex:W4401042735::k00": "openalex:W4394838812::k00", "openalex:W4401042735::k01": "openalex:W4394838812::k01", "openalex:W4394838812::k02": "openalex:W4394838812::k00"}}}, {"id": "iso:openalex:W4402670429", "type": "isolated_paper", "severity": "low", "title": "Chain-of-Verification Reduces Hallucination in Large Language Models", "detail": "No cross-paper relations \u2014 unconnected to the rest of the atlas.", "action": "Remove from atlas", "items": ["paper:openalex:W4402670429"], "op": {"kind": "remove", "paper": "openalex:W4402670429"}}, {"id": "iso:arxiv:2504.17204v1", "type": "isolated_paper", "severity": "low", "title": "Factually: Exploring Wearable Fact-Checking for Augmented Truth Discernment", "detail": "No cross-paper relations \u2014 unconnected to the rest of the atlas.", "action": "Remove from atlas", "items": ["paper:arxiv:2504.17204v1"], "op": {"kind": "remove", "paper": "arxiv:2504.17204v1"}}]}</script>
  <script>
  const RAW = JSON.parse(document.getElementById("graph-data").textContent);
  // Working copy (Edit mode mutates this, never the embedded source).
  const DATA = {
    contributions: RAW.contributions.map((c) => ({ ...c })),
    edges: RAW.edges.map((e) => ({ ...e })),
    papers: RAW.papers || {},
    flags: (RAW.flags || []).map((f) => ({ ...f })),
  };
  const SIDE = document.getElementById("side");
  const EMPTY_HINT = "Hover a node to focus its neighbours. Click for details — click empty space or press Esc to deselect.";

  // relation styling (muted) ------------------------------------------------
  const relColor = {
    supports:"#0a9396", refines:"#ca6702", builds_on:"#287271", extends:"#ee9b00",
    contradicts:"#ae2012", contrast:"#bb6b00", mentions:"#9aa0b0",
  };
  const STATED = "#d8cdb5";
  const directed = new Set(["refines","builds_on","extends","contradicts","contrast"]);
  const relOf = (r) => (relColor[r] ? r : "mentions");
  const DOT = "#94d2bd", DOT_BORDER = "#c5cbd6";
  const PAPER_FILL = "#e9d8a6", PAPER_BORDER = "#c5b78f";
  const GREY_DOT = "#cdd2cc", GREY_DOT_BORDER = "#dcd9d0";
  const GREY_PAPER_FILL = "#edeae1", GREY_PAPER_BORDER = "#d3cdbf", GREY_TEXT = "#9aa0b0";

  const meta = DATA.papers;
  const citeOf = (pid) => (meta[pid] && meta[pid].cite) ||
    pid.replace(/^openalex:/, "").replace(/^arxiv:/, "arXiv ");

  // derived state (recomputed whenever the working data changes) -------------
  let papers, nContrib, rank, inLineage, maxRank, unsitList;
  const situated = (pid) => !!(inLineage && inLineage.has(pid));

  function recompute() {
    papers = Array.from(new Set(DATA.contributions.map((c) => c.paper_id)));
    nContrib = {};
    DATA.contributions.forEach((c) => (nContrib[c.paper_id] = (nContrib[c.paper_id] || 0) + 1));

    const LIN = new Set(["refines", "extends", "builds_on"]);
    const pidOf = (cid) => cid.split("::")[0];
    const cset = new Set(DATA.contributions.map((c) => c.id));
    const succ = new Map(papers.map((p) => [p, new Set()]));
    const indeg = new Map(papers.map((p) => [p, 0]));
    inLineage = new Set();
    DATA.edges.forEach((e) => {
      if (!LIN.has(e.relation) || !cset.has(e.src) || !cset.has(e.dst)) return;
      const a = pidOf(e.dst), b = pidOf(e.src);
      if (a === b || !succ.has(a) || !succ.has(b)) return;
      if (!succ.get(a).has(b)) { succ.get(a).add(b); indeg.set(b, indeg.get(b) + 1); }
      inLineage.add(a); inLineage.add(b);
    });
    rank = new Map(papers.map((p) => [p, 0]));
    const ind = new Map(indeg);
    const q = papers.filter((p) => ind.get(p) === 0);
    while (q.length) {
      const u = q.shift();
      succ.get(u).forEach((v) => {
        rank.set(v, Math.max(rank.get(v), rank.get(u) + 1));
        ind.set(v, ind.get(v) - 1);
        if (ind.get(v) === 0) q.push(v);
      });
    }
    maxRank = Math.max(0, ...papers.filter(situated).map((p) => rank.get(p)));
    unsitList = papers.filter((p) => !situated(p));
  }

  // svg scaffold (persists across rebuilds) ----------------------------------
  const canvas = document.getElementById("canvas");
  let W = canvas.clientWidth, H = canvas.clientHeight;
  const svg = d3.select("#canvas").append("svg").attr("viewBox", [0, 0, W, H]);
  const defs = svg.append("defs");
  Object.entries(relColor).forEach(([rel, c]) => {
    defs.append("marker").attr("id", "arrow-" + rel).attr("viewBox", "0 -5 10 10")
      .attr("refX", 18).attr("refY", 0).attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto")
      .append("path").attr("d", "M0,-4L9,0L0,4").attr("fill", c);
  });
  const root = svg.append("g");
  const zoom = d3.zoom().scaleExtent([0.2, 4]).on("zoom", (e) => root.attr("transform", e.transform));
  svg.call(zoom);
  svg.on("click", (e) => { if (!e.defaultPrevented) clearSelection(); });

  let mode = "view", showPapers = true, selectedId = null;
  let sim, sNode, cNode, cLabel, relLink, statedLink, badge, byId, adj, incident;

  function build() {
    root.selectAll("*").remove();
    badge = null;

    // radial geometry: ring per lineage rank, frontier at the rim
    const cx = W / 2, cy = H / 2;
    const maxROut = Math.min(W, H) / 2 - 64;
    const frontierRank = maxRank + (unsitList.length ? 1 : 0);
    const R0 = Math.max(72, maxROut * 0.2);
    const ringGap = (maxROut - R0) / Math.max(1, frontierRank);
    const radiusOfRank = (r) => R0 + r * ringGap;
    const radiusOf = (pid) => radiusOfRank(situated(pid) ? rank.get(pid) : frontierRank);
    const ringMembers = {};
    papers.forEach((p) => {
      const k = situated(p) ? rank.get(p) : frontierRank;
      (ringMembers[k] = ringMembers[k] || []).push(p);
    });
    const angle = new Map();
    Object.keys(ringMembers).forEach((k) => {
      const arr = ringMembers[k], off = Number(k) * 0.7;
      arr.forEach((p, i) => angle.set(p, off + (2 * Math.PI * i) / arr.length));
    });
    const targetOf = (pid) => {
      const r = radiusOf(pid), a = angle.get(pid) || 0;
      return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a), r };
    };
    drawRings(cx, cy, radiusOfRank, frontierRank, unsitList.length > 0);

    const cNodes = DATA.contributions.map((c) => ({
      id: c.id, type: "contribution", paper_id: c.paper_id,
      statement: c.statement, kind: c.kind, quote: c.quote,
    }));
    const pNodes = showPapers
      ? papers.map((pid) => ({ id: "paper:" + pid, type: "paper", paper_id: pid }))
      : [];
    const nodes = cNodes.concat(pNodes);
    byId = new Map(nodes.map((n) => [n.id, n]));
    nodes.forEach((n) => { const t = targetOf(n.paper_id); n.tx = t.x; n.ty = t.y; n._r = t.r; });

    const relLinks = DATA.edges
      .filter((e) => byId.has(e.src) && byId.has(e.dst))
      .map((e, i) => ({ id: "r" + i, kind: "relation", source: e.src, target: e.dst,
        relation: relOf(e.relation), rawRelation: e.relation, evidence: e.evidence, confidence: e.confidence }));
    const statedLinks = showPapers
      ? DATA.contributions.map((c, i) => ({ id: "s" + i, kind: "stated_in", source: c.id, target: "paper:" + c.paper_id }))
          .filter((l) => byId.has(l.target))
      : [];
    const links = relLinks.concat(statedLinks);

    adj = new Map(nodes.map((n) => [n.id, new Set([n.id])]));
    incident = new Map(nodes.map((n) => [n.id, new Set()]));
    links.forEach((l) => {
      adj.get(l.source).add(l.target); adj.get(l.target).add(l.source);
      incident.get(l.source).add(l.id); incident.get(l.target).add(l.id);
    });

    statedLink = root.append("g").attr("stroke", STATED).selectAll("line").data(statedLinks).join("line")
      .attr("stroke-width", 1).attr("stroke-opacity", 0.45);
    relLink = root.append("g").attr("fill", "none").selectAll("line").data(relLinks).join("line")
      .attr("stroke", (d) => relColor[d.relation])
      .attr("stroke-width", (d) => 1 + 2 * (d.confidence ?? 0.5))
      .attr("stroke-opacity", 0.6)
      .attr("marker-end", (d) => (directed.has(d.rawRelation) ? `url(#arrow-${d.relation})` : null));

    sNode = root.append("g").selectAll("g.paper-box").data(pNodes).join("g").attr("class", "paper-box")
      .style("cursor", "pointer")
      .call(d3.drag().on("start", dragStart).on("drag", dragged).on("end", dragEnd))
      .on("mouseover", (_, d) => focus(d.id))
      .on("mouseout", () => focus(selectedId))
      .on("click", (e, d) => { e.stopPropagation(); selectedId = d.id; focus(d.id); if (mode !== "edit") showPaperDetail(d.paper_id); });
    sNode.each(function (d) {
      const label = citeOf(d.paper_id);
      const w = Math.max(58, label.length * 6.2 + 16);
      const sit = situated(d.paper_id);
      const g = d3.select(this);
      g.append("rect").attr("x", -w / 2).attr("y", -11).attr("width", w).attr("height", 22)
        .attr("rx", 6).attr("fill", sit ? PAPER_FILL : GREY_PAPER_FILL)
        .attr("stroke", sit ? PAPER_BORDER : GREY_PAPER_BORDER).attr("stroke-width", 1.8)
        .attr("stroke-dasharray", sit ? null : "4 3");
      g.append("text").attr("y", 1).attr("fill", sit ? "#3b4252" : GREY_TEXT).text(label);
    });

    cNode = root.append("g").selectAll("circle").data(cNodes).join("circle")
      .attr("r", 7).attr("fill", (d) => (situated(d.paper_id) ? DOT : GREY_DOT))
      .attr("stroke", DOT_BORDER).attr("stroke-width", 1.5).style("cursor", "pointer")
      .call(d3.drag().on("start", dragStart).on("drag", dragged).on("end", dragEnd))
      .on("mouseover", (_, d) => focus(d.id))
      .on("mouseout", () => focus(selectedId))
      .on("click", (e, d) => { e.stopPropagation(); selectedId = d.id; focus(d.id); if (mode !== "edit") showDetail(d); });

    cLabel = root.append("g").selectAll("text").data(cNodes).join("text")
      .attr("class", "nodelabel").attr("dx", 10).attr("dy", 4).style("display", "none")
      .text((d) => truncate(d.statement, 46));

    sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id((d) => d.id)
        .distance((l) => (l.kind === "stated_in" ? 46 : 115))
        .strength((l) => (l.kind === "stated_in" ? 0.7 : 0.12)))
      .force("charge", d3.forceManyBody().strength((d) => (d.type === "paper" ? -240 : -85)))
      .force("radial", d3.forceRadial((d) => d._r, cx, cy).strength(0.88))
      .force("x", d3.forceX((d) => d.tx).strength(0.09))
      .force("y", d3.forceY((d) => d.ty).strength(0.09))
      .force("collide", d3.forceCollide((d) => (d.type === "paper" ? 28 : 13)))
      .stop();
    for (let i = 0; i < 420; i++) sim.tick();
    if (mode === "edit") drawBadges();
    ticked();
    sim.on("tick", ticked);

    markSelected();
    focus(selectedId);
    fit();
  }

  function drawBadges() {
    const flagged = new Set();
    DATA.flags.forEach((f) => (f.items || []).forEach((id) => flagged.add(id)));
    const data = Array.from(flagged).map((id) => byId.get(id)).filter(Boolean);
    badge = root.append("g").selectAll("g.badge").data(data).join("g").attr("class", "badge")
      .style("cursor", "pointer").on("click", (e, d) => { e.stopPropagation(); focus(d.id); });
    badge.append("circle").attr("cx", 11).attr("cy", -11).attr("r", 7)
      .attr("fill", "#d98324").attr("stroke", "#fff").attr("stroke-width", 1.5);
    badge.append("text").attr("x", 11).attr("y", -7.5).attr("text-anchor", "middle")
      .attr("font-size", 10).attr("font-weight", 700).attr("fill", "#fff").text("!");
  }

  function ticked() {
    statedLink.attr("x1", (d) => d.source.x).attr("y1", (d) => d.source.y)
              .attr("x2", (d) => d.target.x).attr("y2", (d) => d.target.y);
    relLink.attr("x1", (d) => d.source.x).attr("y1", (d) => d.source.y)
           .attr("x2", (d) => d.target.x).attr("y2", (d) => d.target.y);
    cNode.attr("cx", (d) => d.x).attr("cy", (d) => d.y);
    cLabel.attr("x", (d) => d.x).attr("y", (d) => d.y);
    sNode.attr("transform", (d) => `translate(${d.x},${d.y})`);
    if (badge) badge.attr("transform", (d) => `translate(${d.x},${d.y})`);
  }

  function focus(id) {
    if (!id) {
      cNode.attr("opacity", 1); sNode.attr("opacity", 1);
      relLink.attr("stroke-opacity", 0.6).attr("stroke-width", (d) => 1 + 2 * (d.confidence ?? 0.5));
      statedLink.attr("stroke-opacity", 0.45);
      cLabel.style("display", "none");
      return;
    }
    const near = adj.get(id) || new Set([id]);
    const inc = incident.get(id) || new Set();
    cNode.attr("opacity", (n) => (near.has(n.id) ? 1 : 0.1));
    sNode.attr("opacity", (n) => (near.has(n.id) ? 1 : 0.1));
    relLink.attr("stroke-opacity", (l) => (inc.has(l.id) ? 0.95 : 0.04))
           .attr("stroke-width", (l) => (inc.has(l.id) ? 2 + 2 * (l.confidence ?? 0.5) : 1));
    statedLink.attr("stroke-opacity", (l) => (inc.has(l.id) ? 0.8 : 0.03));
    cLabel.style("display", (n) => (near.has(n.id) ? null : "none"));
  }

  function markSelected() {
    cNode.attr("stroke", (d) => (d.id === selectedId ? "#3b4252" : (situated(d.paper_id) ? DOT_BORDER : GREY_DOT_BORDER)))
         .attr("stroke-width", (d) => (d.id === selectedId ? 2.5 : 1.5));
    sNode.select("rect").attr("stroke", (d) => (d.id === selectedId ? "#3b4252" : (situated(d.paper_id) ? PAPER_BORDER : GREY_PAPER_BORDER)))
         .attr("stroke-width", (d) => (d.id === selectedId ? 3 : 1.8));
  }

  function clearSelection() {
    selectedId = null;
    focus(null); markSelected();
    if (mode !== "edit") SIDE.innerHTML = `<div class="empty">${EMPTY_HINT}</div>`;
  }

  // side panel (view mode) ---------------------------------------------------
  function showDetail(d) {
    markSelected();
    const nbrs = DATA.edges.filter((e) => e.src === d.id || e.dst === d.id).map((e) => {
      const out = e.src === d.id;
      return { rel: e.relation, dir: out ? "→" : "←", other: out ? e.dst : e.src, evidence: e.evidence, confidence: e.confidence };
    });
    const nbrHtml = nbrs.length === 0
      ? '<div class="empty" style="padding:8px 0">No cross-paper relations.</div>'
      : nbrs.map((nb) => `
          <div class="neighbour">
            <div class="nh"><span class="pill" style="background:${relColor[relOf(nb.rel)]}">${nb.rel}</span>
              <span class="nid">conf ${(nb.confidence ?? 0).toFixed(2)}</span></div>
            <div class="nid">${nb.dir} ${esc(citeOf((byId.get(nb.other) || {}).paper_id || ""))}</div>
            ${nb.evidence ? `<div class="ev">${esc(nb.evidence)}</div>` : ""}
          </div>`).join("");
    SIDE.innerHTML = `
      <div class="field"><span class="pill" style="background:#94d2bd;color:#1f2933">${esc(d.kind || "contribution")}</span></div>
      <div class="field"><div class="k">Contribution</div><div class="v">${esc(d.statement)}</div></div>
      ${d.quote ? `<div class="field"><div class="k">Stated as</div><div class="v quote">${esc(d.quote)}</div></div>` : ""}
      <div class="field"><div class="k">Paper</div><div class="v src">${esc(citeOf(d.paper_id))}</div></div>
      <div class="field"><div class="k">Cross-paper relations (${nbrs.length})</div>${nbrHtml}</div>`;
  }

  function showPaperDetail(pid) {
    markSelected();
    const m = meta[pid] || {};
    SIDE.innerHTML = `
      <div class="field"><span class="pill" style="background:#e9d8a6;color:#3b4252">paper</span></div>
      <div class="field"><div class="k">Title</div><div class="v">${esc(m.title || citeOf(pid))}</div></div>
      <div class="field"><div class="k">Cite</div><div class="v src">${esc(m.cite || citeOf(pid))}</div></div>
      ${m.authors ? `<div class="field"><div class="k">Authors</div><div class="v">${esc(m.authors)}</div></div>` : ""}
      ${m.year ? `<div class="field"><div class="k">Year</div><div class="v">${esc(m.year)}</div></div>` : ""}
      <div class="field"><div class="k">Contributions in this atlas</div><div class="v">${nContrib[pid] || 0}</div></div>
      ${m.url ? `<div class="field"><a class="src" href="${m.url}" target="_blank">open source ↗</a></div>` : ""}`;
  }

  // ── Edit mode: review queue + apply/ignore ──────────────────────────────
  const decisions = { applied: [], ignored: [] };

  function renderQueue() {
    document.getElementById("issueCount").textContent = DATA.flags.length + " open";
    if (!DATA.flags.length) {
      SIDE.innerHTML = `<div class="qdone">✓ No open issues.</div>
        <button class="expbtn" onclick="review.export()">⬇ Export resolutions (${decisions.applied.length + decisions.ignored.length})</button>`;
      return;
    }
    const order = { high: 0, medium: 1, low: 2 };
    const fs = [...DATA.flags].sort((a, b) => order[a.severity] - order[b.severity]);
    SIDE.innerHTML = `<div class="qhead">${DATA.flags.length} issue(s) flagged for review. Apply a fix, or ignore. Nothing is saved until you export.</div>`
      + fs.map((f) => `
        <div class="flag ${f.severity}" onclick="review.focus('${f.id}')">
          <div class="ft"><span>${f.type.replace(/_/g, " ")}</span><span class="sev">${f.severity}</span></div>
          ${f.title ? `<div class="ttl"><b>${esc(f.title)}</b></div>` : ""}
          <div class="fd">${esc(f.detail)}</div>
          <div class="acts">
            <button class="apply" onclick="event.stopPropagation();review.apply('${f.id}')">${esc(f.action || "Apply")}</button>
            <button class="ignore" onclick="event.stopPropagation();review.ignore('${f.id}')">Ignore</button>
          </div>
        </div>`).join("")
      + `<button class="expbtn" onclick="review.export()">⬇ Export resolutions (${decisions.applied.length + decisions.ignored.length})</button>`;
  }

  function applyOp(op) {
    if (op.kind === "merge") {
      const from = new Set(op.from);
      DATA.contributions.forEach((c) => { if (from.has(c.paper_id)) c.paper_id = op.canon; });
      const cr = op.contrib_remap || {};
      const drop = new Set(Object.keys(cr));
      DATA.contributions = DATA.contributions.filter((c) => !drop.has(c.id));
      DATA.edges.forEach((e) => { if (cr[e.src]) e.src = cr[e.src]; if (cr[e.dst]) e.dst = cr[e.dst]; });
      const cp = {}; DATA.contributions.forEach((c) => (cp[c.id] = c.paper_id));
      const seen = new Set();
      DATA.edges = DATA.edges.filter((e) => {
        if (e.src === e.dst) return false;
        if (cp[e.src] && cp[e.src] === cp[e.dst]) return false;
        const k = e.src + "|" + e.dst + "|" + e.relation;
        if (seen.has(k)) return false; seen.add(k); return true;
      });
    } else if (op.kind === "remove") {
      const cs = new Set(DATA.contributions.filter((c) => c.paper_id === op.paper).map((c) => c.id));
      DATA.contributions = DATA.contributions.filter((c) => c.paper_id !== op.paper);
      DATA.edges = DATA.edges.filter((e) => !cs.has(e.src) && !cs.has(e.dst));
    }
  }

  const review = {
    apply(id) {
      const f = DATA.flags.find((x) => x.id === id);
      if (!f) return;
      applyOp(f.op);
      decisions.applied.push({ id: f.id, type: f.type, op: f.op });
      DATA.flags = DATA.flags.filter((x) => x.id !== id);
      selectedId = null;
      recompute(); build(); renderQueue();
    },
    ignore(id) {
      const f = DATA.flags.find((x) => x.id === id);
      if (!f) return;
      decisions.ignored.push({ id: f.id, type: f.type });
      DATA.flags = DATA.flags.filter((x) => x.id !== id);
      build(); renderQueue();
    },
    focus(id) {
      const f = DATA.flags.find((x) => x.id === id);
      if (!f || !f.items) return;
      const node = f.items.map((i) => byId.get(i)).find(Boolean);
      if (node) { selectedId = node.id; focus(node.id); markSelected(); }
    },
    export() {
      const blob = new Blob([JSON.stringify(decisions, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob); a.download = "review_resolutions.json"; a.click();
      URL.revokeObjectURL(a.href);
    },
  };
  window.review = review;

  function enterMode(m) {
    mode = m;
    document.getElementById("mView").classList.toggle("on", m === "view");
    document.getElementById("mEdit").classList.toggle("on", m === "edit");
    document.getElementById("issueCount").style.display = m === "edit" ? "inline-block" : "none";
    selectedId = null;
    if (m === "edit") {
      document.getElementById("togglePapers").checked = true; showPapers = true;
      renderQueue();
    } else {
      SIDE.innerHTML = `<div class="empty">${EMPTY_HINT}</div>`;
    }
    build();
  }

  // rings + chrome -----------------------------------------------------------
  function drawRings(cx, cy, radiusOfRank, frontierRank, outerUnsituated) {
    const g = root.append("g");
    for (let r = 0; r <= frontierRank; r++) {
      const outer = r === frontierRank;
      g.append("circle").attr("cx", cx).attr("cy", cy).attr("r", radiusOfRank(r)).attr("fill", "none")
        .attr("stroke", outer ? (outerUnsituated ? "#d7d3c8" : "#c9b89a") : "#e2e5ea")
        .attr("stroke-width", outer ? 1.4 : 1).attr("stroke-dasharray", outer ? "7 5" : "2 7");
    }
    g.append("text").attr("x", cx).attr("y", cy + 3).attr("text-anchor", "middle")
      .attr("fill", "#b9a98a").attr("font-size", 11).attr("font-style", "italic").text("foundational");
    g.append("text").attr("x", cx).attr("y", cy - radiusOfRank(frontierRank) - 10).attr("text-anchor", "middle")
      .attr("fill", outerUnsituated ? "#a7a395" : "#9aa0b0").attr("font-size", 11)
      .attr("font-style", outerUnsituated ? "italic" : "normal")
      .text(outerUnsituated ? "known · not yet connected" : "frontier of knowledge →");
  }

  function fit() {
    const ns = (cNode.data() || []).concat(sNode.data() || []);
    if (!ns.length) return;
    const xs = ns.map((n) => n.x), ys = ns.map((n) => n.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
    const gw = maxX - minX || 1, gh = maxY - minY || 1, pad = 80;
    const k = Math.min((W - pad * 2) / gw, (H - pad * 2) / gh, 2.2);
    svg.transition().duration(350).call(zoom.transform,
      d3.zoomIdentity.translate(W / 2 - k * (minX + gw / 2), H / 2 - k * (minY + gh / 2)).scale(k));
  }

  function dragStart(e, d) { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
  function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
  function dragEnd(e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }

  function truncate(s, n) { return s && s.length > n ? s.slice(0, n - 1) + "…" : (s || ""); }
  function esc(s) { return (s || "").toString().replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

  // controls -----------------------------------------------------------------
  document.getElementById("zin").onclick = () => svg.transition().call(zoom.scaleBy, 1.4);
  document.getElementById("zout").onclick = () => svg.transition().call(zoom.scaleBy, 1 / 1.4);
  document.getElementById("zfit").onclick = fit;
  document.getElementById("togglePapers").onchange = (e) => { showPapers = e.target.checked; build(); };
  document.getElementById("mView").onclick = () => enterMode("view");
  document.getElementById("mEdit").onclick = () => enterMode("edit");
  window.addEventListener("keydown", (e) => { if (e.key === "Escape") clearSelection(); });
  window.addEventListener("resize", () => {
    W = canvas.clientWidth; H = canvas.clientHeight;
    svg.attr("viewBox", [0, 0, W, H]);
    if (sim) sim.force("radial", d3.forceRadial((d) => d._r, W / 2, H / 2).strength(0.88)).alpha(0.2).restart();
  });

  // legend -------------------------------------------------------------------
  const relsPresent = Array.from(new Set(RAW.edges.map((e) => e.relation)));
  document.getElementById("legend").innerHTML =
    `<div class="lg-title">Nodes</div>` +
    `<div class="lg-row"><span class="glyph box" style="background:#e9d8a6;border-color:#c5b78f"></span><span>paper</span></div>` +
    `<div class="lg-row"><span class="glyph" style="background:#94d2bd;border:1.5px solid #c5cbd6"></span><span>contribution</span></div>` +
    `<div class="lg-row"><span class="glyph box" style="background:#edeae1;border-color:#d3cdbf;border-style:dashed"></span><span>not yet connected</span></div>` +
    `<div class="lg-title">Edges</div>` +
    relsPresent.map((r) => `<div class="lg-row"><span class="swatch" style="border-color:${relColor[relOf(r)]}"></span><span>${r}</span></div>`).join("") +
    `<div class="lg-row"><span class="swatch faint" style="border-color:${STATED}"></span><span>stated_in</span></div>`;

  document.getElementById("sub").innerHTML =
    `<b>${RAW.contributions.length}</b> contributions · <b>${new Set(RAW.contributions.map((c) => c.paper_id)).size}</b> papers · ` +
    `<b>${RAW.edges.length}</b> cross-paper relations`;

  // init ---------------------------------------------------------------------
  const params = new URLSearchParams(location.search);
  recompute();
  enterMode(params.get("mode") === "edit" ? "edit" : "view");
  if (params.get("apply") === "all") {
    DATA.flags.filter((f) => f.op && f.op.kind === "merge").map((f) => f.id).forEach((id) => review.apply(id));
  }
  </script>
</body>
</html>
